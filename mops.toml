[package]
name = "backend"
version = "0.1.0"

[build]
outputDir = "src/backend/dist"
args = [ "--release" ]

[canisters.backend]
main = "src/backend/main.mo"

[canisters.backend.check-stable]
path = ".old/src/backend/dist/backend.most"

[canisters.backend.migrations]
chain = "src/backend/migrations"
check-limit = 1

[toolchain]
moc = "1.10.1"
lintoko = "0.10.0"

[lint]
extends = true

[moc]
args = [ "-E=M0254", "-W=M0235,M0223,M0236,M0237", "-A=M0241", "--default-persistent-actors", "--actor-idl=src/backend/system-idl", "--implicit-package=core", "-no-check-ir", "--generate-view-queries" ]

[dependencies]
core = "2.6.0"
caffeineai-data-viewer = "0.1.0"
caffeineai-authorization = "1.0.0"
caffeineai-lints = "0.1.0"
caffeineai-oql = "0.2.0"
